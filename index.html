<!DOCTYPE html>
<html lang = 'vi'>
    <head>
        <meta charset="UTF-8">
        <title>Bảng tuần hoàn hóa học 100% con nguoi code</title>
        <script src = "element-data.js" defer></script>
        <script src = "script.js" defer></script>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="info.css">
    </head>

    <body>
        <div class="typeTable"></div>
        <div class = 'elements'></div>
        <div class = 'bottomElements'></div>
        <div id = "infoBox">
            <div class = "headerInfo">
                <button id = "closeButton">⨉</button>
                <span class = 'symbol'></span>
                <span class = 'name'></span>
                <div class = 'bottom'>
                    <span class = 'number'></span>
                    <span class = 'mass'></span>
                    <span class = 'group'></span>
                    <span class = 'cycle'></span>
                    <span class = 'type'>
                        <span class = 'typeText'></span>
                        <span class = 'typeDetail'></span>
                    </span>
                </div>
            </div>
            <div class = "mainInfo">
                <span class = 'characteristic'></span>
                <span class = 'popularCompound'>
                    <span class = 'text'>HỢP CHẤT PHỔ BIẾN</span>
                    <span class = 'compuondDetail'></span>
                    <span class = 'compuonds'></span>
                </span>
                <span class = 'popularReaction'>
                    <span class = 'text'>PHẢN ỨNG PHỔ BIẾN</span>
                    <span class = 'reactionDetails'></span>
                    <span class = 'reactions'></span>
                </span>
            </div>
            <div class = "elementModel"></div>
        </div>
        <div id = "blurBackground"></div>
    </body>
</html>
